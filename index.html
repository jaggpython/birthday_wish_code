<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff6ec7,#ff9a9e,#fad0c4,#ffd1ff);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* Floating Balloons */

.balloon{
position:absolute;
bottom:-150px;
width:60px;
height:75px;
border-radius:50%;
animation:float linear infinite;
opacity:.8;
}

.balloon:after{
content:"";
position:absolute;
left:50%;
top:75px;
width:2px;
height:80px;
background:white;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
}

100%{
transform:translateY(-130vh) rotate(360deg);
}

}

.card{

width:90%;
max-width:500px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);
position:relative;
z-index:10;
}

.card h2{

font-size:2rem;
color:white;
margin-bottom:20px;

}

button{

padding:15px 40px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
background:linear-gradient(45deg,#ff4081,#ff9800);
color:white;
font-weight:bold;
transition:.3s;
box-shadow:0 8px 25px rgba(0,0,0,.25);

}

button:hover{

transform:scale(1.1);

}

.message{

margin-top:30px;
display:none;
animation:fadeIn 1s ease;

}

.message h1{

font-size:3rem;
color:#fff;
text-shadow:
0 0 15px #fff,
0 0 25px gold,
0 0 40px hotpink;

animation:pulse 1.2s infinite;

}

.message p{

margin-top:20px;
font-size:20px;
color:white;
line-height:1.6;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Confetti */

.confetti{

position:absolute;
width:10px;
height:18px;
top:-20px;
animation:confetti 4s linear forwards;

}

@keyframes confetti{

0%{
transform:translateY(-20px) rotate(0);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(900deg);
opacity:0;
}

}

@media(max-width:600px){

.message h1{
font-size:2rem;
}

.message p{
font-size:18px;
}

.card{
padding:25px;
}

button{
width:100%;
}

}

.balloons{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.balloon{
    position:absolute;
    bottom:-180px;
    width:80px;
    height:100px;
    border-radius:50%;
    animation:fly 12s linear infinite;
    box-shadow:
        inset -10px -10px 20px rgba(0,0,0,.18),
        inset 10px 10px 20px rgba(255,255,255,.3);
}

.balloon::before{
    content:"";
    position:absolute;
    left:50%;
    bottom:-12px;
    transform:translateX(-50%);
    width:14px;
    height:14px;
    background:inherit;
    clip-path:polygon(50% 100%,0 0,100% 0);
}

.balloon::after{
    content:"";
    position:absolute;
    left:50%;
    top:100%;
    width:2px;
    height:120px;
    background:white;
}

.red{background:#ff4d6d;left:5%;animation-delay:0s;}
.blue{background:#4dabff;left:18%;animation-delay:2s;}
.yellow{background:#ffd43b;left:32%;animation-delay:4s;}
.green{background:#51cf66;left:46%;animation-delay:1s;}
.pink{background:#ff66c4;left:60%;animation-delay:3s;}
.purple{background:#b197fc;left:74%;animation-delay:5s;}
.orange{background:#ff922b;left:86%;animation-delay:2.5s;}
.cyan{background:#3bc9db;left:94%;animation-delay:6s;}

@keyframes fly{
    0%{
        transform:translateY(0) rotate(-8deg);
    }
    25%{
        transform:translateY(-30vh) translateX(20px) rotate(8deg);
    }
    50%{
        transform:translateY(-60vh) translateX(-20px) rotate(-8deg);
    }
    75%{
        transform:translateY(-90vh) translateX(15px) rotate(8deg);
    }
    100%{
        transform:translateY(-140vh) rotate(-8deg);
    }
}
</style>

</head>

<body>

<div class="balloons">
    <div class="balloon red"></div>
    <div class="balloon blue"></div>
    <div class="balloon yellow"></div>
    <div class="balloon green"></div>
    <div class="balloon pink"></div>
    <div class="balloon purple"></div>
    <div class="balloon orange"></div>
    <div class="balloon cyan"></div>
</div>

<div class="card">

<h2>🎁 A Special Gift Awaits 🎁</h2>

<button onclick="showBirthday()">
🎉 Surprise
</button>

<div class="message" id="message">

<h1>🎂 Happy Birthday! 🎂</h1>

<p>
May your day be filled with happiness,
love, laughter, wonderful surprises,
and unforgettable memories.
<br><br>
🌸 Wishing you endless joy, good health,
success, and all the happiness in the world!
💖✨
</p>

</div>

</div>

<script>

// Balloons

const colors=[
"#ff4081",
"#ff9800",
"#00c853",
"#03a9f4",
"#e91e63",
"#9c27b0",
"#ffeb3b"
];

for(let i=0;i<18;i++){

const b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=colors[Math.floor(Math.random()*colors.length)];

b.style.animationDuration=(8+Math.random()*8)+"s";

b.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(b);

}

// Surprise

function showBirthday(){

document.getElementById("message").style.display="block";

confetti();

}

// Confetti

function confetti(){

for(let i=0;i<180;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=(2+Math.random()*3)+"s";

c.style.transform=`rotate(${Math.random()*360}deg)`;

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

}

}
</script>

</body>
</html>
